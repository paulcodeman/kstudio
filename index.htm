<!DOCTYPE html>
<meta charset="UTF-8">
<link rel="stylesheet" href="style/style.css">
<link rel="stylesheet" href="style/gui.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="js/components.js"></script>
<script src="js/download.js"></script>
<script src="js/serializer.js"></script>
<script src="js/core.js"></script>
<script src="js/compiler.js"></script>
<body onmousedown="if(element_list)element_list.style.display='none';" onmousemove="mouse.getX(event);mouse.getY(event);" onkeydown="window.ee = event;CmdKeyDown(event);">
	<div id="list_add_event" class="list_event"></div>
	<div class="panel" id="TopPanel">
		<div class="toolbar">
			<div class="tool-group">
				<div class="button" onmousedown="compile(1);" title="Скомпилировать и запустить"><i class="fa-solid fa-play"></i> Запустить</div>
				<div class="button" onmousedown="compile(2);" title="Скомпилировать и скачать .exe"><i class="fa-solid fa-download"></i> Скачать</div>
			</div>
			<div class="tool-sep"></div>
			<div class="tool-group">
				<div class="button" onmousedown="export_project();" title="Экспорт проекта"><i class="fa-solid fa-file-export"></i> Экспорт</div>
				<div class="button" onmousedown="document.getElementById('import_input').click();" title="Импорт проекта"><i class="fa-solid fa-file-import"></i> Импорт</div>
				<input type="file" id="import_input" accept=".kcm" style="display:none" onchange="import_project(this);">
			</div>
			<div class="tool-sep"></div>
			<div class="tool-group">
				<label class="tool-label">Окно:</label>
				<select class="list_window" id="list_window_add"></select>
			</div>
			<div class="tool-sep"></div>
			<div class="tool-group">
				<label class="tool-label">Сетка:</label>
				<select class="list_window" onchange="change_setka_option(this);">
					<option>Без сетки</option>
					<option selected>5 px</option>
					<option>10 px</option>
					<option>15 px</option>
				</select>
			</div>
		</div>
	</div>
	<div class="mid-layout" id="MidLayout">
		<div class="mid-panel mid-left" id="LeftPanel">
			<div class="palette-header">
				<span>Компоненты</span>
				<span id="palette_view_btn" class="palette-view-btn" onclick="toggle_palette_view()" title="Вид"><i class="fa-solid fa-table-cells"></i></span>
			</div>
			<div id="properies"></div>
		</div>
		<div class="panel-splitter" data-side="left"></div>
		<div class="mid-panel mid-center" id="CenterPanel"><div id="main"><div id="window_background" onmousedown="return false;"><div id="window" oncontextmenu="return false;"></div></div></div></div>
		<div class="panel-splitter" data-side="right"></div>
		<div class="mid-panel mid-right" id="RightPanel"><div class="conteiner">
			<input type="radio" name="odin" checked="checked" id="vkl1"><label for="vkl1" onmousedown="return false;">Свойства</label>
			<input type="radio" name="odin" id="vkl2"><label for="vkl2" onmousedown="return false;">События</label>
			<div>
				<div class="glob_title">Компоненты</div>
				<div class="title"><select class="list" id="component_tree"></select></div>
				<div class="attr">
					<div id="attribute_element"></div>
				</div>
			</div>
			<div>
				<div class="attr events-panel">
					<div class="button" id="add_event" onmousedown="return false;"><image src="img/add_list.PNG">Добавить событие</div>
					<div class="event-actions">
						<div onmousedown="return false;" onclick="delete_event_list();" class="button"><image id="delete_event" src="img/delete.PNG"></div>
						<div onmousedown="return false;" class="button"><image id="replace_event" src="img/replace_event.PNG"></div>
						<div onmousedown="return false;" onclick="click_edit_code();" class="button grow" id="edit_event"><image id="img_replace_event" src="img/edit_event.PNG">Редактировать</div>
					</div>
					<div id="event_cont">
						<table id="list_event"></table>
					</div>
				</div>
			</div>
		</div></div>
	</div>
	<div class="statbar" id="text_status_bar"></div>

	<div id="window_edit_code" class="EditCode">
		<div class="code-editor-body">
			<div class="code_title">void onClick(byte key){</div>
			<div class="body_code_conteiner">
				<textarea id="code_edit_rect"></textarea>
			</div>
		</div>
		<div class="table_button_edit_code"><button onclick="save_edit_code();">Ок</button><button onclick="cancel_edit_code();">Отмена</button></div>
	</div>

	<div id="select_elements_rect"></div>
</body>
